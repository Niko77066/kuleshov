<template id="s03-consent-read-template">
  <div
    data-composition-id="s03-consent-read"
    data-width="1920" data-height="1080"
    data-start="0" data-duration="8.563"
  >
    <div class="bg"></div>
    <div class="browser">
      <div class="chrome">
        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
        <span class="address">samsunghealth.com/shd/gen-ai</span>
      </div>
      <div class="viewport">
        <div class="pagewrap">
          <img class="page" src="assets/consent-page-crop.png" width="1500" alt="" />
          <!-- 四类数据高亮（坐标为 1500 宽显示空间） -->
          <div class="hl wash w1"></div><div class="hl bar b1"></div>
          <div class="hl wash w2"></div><div class="hl bar b2"></div>
          <div class="hl wash w3"></div><div class="hl bar b3"></div>
          <div class="hl wash w4"></div><div class="hl bar b4"></div>
        </div>
      </div>
    </div>

    <style>
      @font-face { font-family: "PingFang SC"; src: local("PingFang SC"); }
      @font-face { font-family: "Noto Sans SC"; src: local("Noto Sans SC"); }
      @font-face { font-family: "SF Mono"; src: local("SF Mono"); }

      [data-composition-id="s03-consent-read"] {
        width: 1920px; height: 1080px; position: relative; overflow: hidden;
        font-family: "PingFang SC", "Noto Sans SC", sans-serif;
      }
      [data-composition-id="s03-consent-read"] .bg {
        position: absolute; inset: 0; background: transparent;
      }
      [data-composition-id="s03-consent-read"] .browser {
        position: absolute; left: 180px; top: 120px; width: 1560px; height: 840px;
        border-radius: 20px; overflow: hidden;
        background: linear-gradient(160deg, rgba(30,36,46,0.55), rgba(16,19,25,0.4));
        backdrop-filter: blur(20px) saturate(1.12);
        -webkit-backdrop-filter: blur(20px) saturate(1.12);
        border: 1px solid rgba(255,255,255,0.12);
        box-shadow: 0 34px 100px rgba(0, 0, 0, 0.58), inset 0 1px 0 rgba(255,255,255,0.16), 0 0 60px rgba(58,120,220,0.10);
      }
      [data-composition-id="s03-consent-read"] .chrome {
        height: 56px; display: flex; align-items: center; padding: 0 24px;
        background: rgba(22,26,32,0.6); border-bottom: 1px solid rgba(255,255,255,0.07);
      }
      [data-composition-id="s03-consent-read"] .dot {
        width: 12px; height: 12px; border-radius: 50%; margin-right: 10px;
      }
      [data-composition-id="s03-consent-read"] .dot:nth-child(1) { background: #FF5F57; }
      [data-composition-id="s03-consent-read"] .dot:nth-child(2) { background: #FEBC2E; }
      [data-composition-id="s03-consent-read"] .dot:nth-child(3) { background: #28C840; }
      [data-composition-id="s03-consent-read"] .address {
        margin-left: 18px; font-family: "SF Mono", Menlo, monospace;
        font-size: 21px; color: #AAB2BD; background: rgba(10,12,15,0.6);
        border: 1px solid rgba(255,255,255,0.06);
        padding: 7px 20px; border-radius: 8px;
      }
      [data-composition-id="s03-consent-read"] .viewport {
        position: absolute; top: 56px; left: 0; width: 1560px; height: 784px;
        overflow: hidden; background: #FDFDFD;
      }
      [data-composition-id="s03-consent-read"] .pagewrap {
        position: absolute; left: 30px; top: 0; width: 1500px;
        transform-origin: top left; will-change: transform;
      }
      [data-composition-id="s03-consent-read"] .page { display: block; }
      [data-composition-id="s03-consent-read"] .hl { position: absolute; }
      [data-composition-id="s03-consent-read"] .wash {
        background: rgba(74, 158, 255, 0.14); border-radius: 4px; opacity: 0;
      }
      [data-composition-id="s03-consent-read"] .bar {
        height: 3px; background: #4A9EFF; border-radius: 2px;
        transform-origin: left center; box-shadow: 0 0 10px rgba(74,158,255,0.7);
      }
      /* 四类条目坐标（crop 2640x880 → 1500 宽 ×0.568） */
      [data-composition-id="s03-consent-read"] .w1 { left: 64px; top: 196px; width: 790px; height: 30px; }
      [data-composition-id="s03-consent-read"] .b1 { left: 66px; top: 228px; width: 786px; }
      [data-composition-id="s03-consent-read"] .w2 { left: 64px; top: 224px; width: 610px; height: 30px; }
      [data-composition-id="s03-consent-read"] .b2 { left: 66px; top: 256px; width: 606px; }
      [data-composition-id="s03-consent-read"] .w3 { left: 64px; top: 251px; width: 840px; height: 30px; }
      [data-composition-id="s03-consent-read"] .b3 { left: 66px; top: 283px; width: 836px; }
      [data-composition-id="s03-consent-read"] .w4 { left: 64px; top: 279px; width: 940px; height: 30px; }
      [data-composition-id="s03-consent-read"] .b4 { left: 66px; top: 311px; width: 936px; }
    </style>

    <script src="assets/gsap.min.js"></script>
    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        const root = document.querySelector('[data-composition-id="s03-consent-read"]');
        const wrap = root.querySelector(".pagewrap");
        const browser = root.querySelector(".browser");

        // 浏览器窗对焦落定入场
        gsap.set(browser, { filter: "blur(20px)", opacity: 0, scale: 0.985, transformOrigin: "50% 50%" });
        tl.to(browser, { filter: "blur(0px)", opacity: 1, scale: 1, duration: 0.55, ease: "power2.out" }, 0);

        // 开场停在标题特写（缩放进实录），1.2s 后展开全览
        gsap.set(wrap, { scale: 1.9, x: -1100, y: 211 });
        [1, 2, 3, 4].forEach(i => gsap.set(root.querySelector(".b" + i), { scaleX: 0 }));
        tl.to(wrap, { scale: 1.0, x: 0, y: 142, duration: 0.75, ease: "power2.inOut" }, 1.2);
        // 展开后极缓上移，画面保持活性
        tl.to(wrap, { y: 118, duration: 6.5, ease: "none" }, 2.0);

        // 四类逐拍高亮（音频词时间 −7.187）：身体 3.96 / 用药 5.08 / 诊断 6.24 / 经期 7.68
        const cues = [3.96, 5.08, 6.24, 7.68];
        cues.forEach((t, i) => {
          tl.to(root.querySelector(".w" + (i + 1)), { opacity: 1, duration: 0.2, ease: "power2.out" }, t);
          tl.to(root.querySelector(".b" + (i + 1)), { scaleX: 1, duration: 0.35, ease: "power4.out" }, t);
        });

        tl.to({}, { duration: 8.563 }, 0);
        window.__timelines["s03-consent-read"] = tl;
      })();
    </script>
  </div>
</template>
