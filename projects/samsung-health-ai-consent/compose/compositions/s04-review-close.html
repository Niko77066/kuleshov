<template id="s04-review-close-template">
  <div
    data-composition-id="s04-review-close"
    data-width="1920" data-height="1080"
    data-start="0" data-duration="1.757"
  >
    <div class="bg"></div>
    <div class="browser">
      <div class="chrome">
        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
        <span class="address">samsunghealth.com/shd/gen-ai</span>
      </div>
      <div class="viewport">
        <div class="pagewrap">
          <img class="page" src="assets/consent-page-crop.png" width="1500" alt="" />
          <!-- "including human review" 特写高亮（琥珀配额 1/3） -->
          <div class="hl wash"></div>
          <div class="hl bar"></div>
        </div>
      </div>
    </div>

    <style>
      @font-face { font-family: "PingFang SC"; src: local("PingFang SC"); }
      @font-face { font-family: "Noto Sans SC"; src: local("Noto Sans SC"); }
      @font-face { font-family: "SF Mono"; src: local("SF Mono"); }

      [data-composition-id="s04-review-close"] {
        width: 1920px; height: 1080px; position: relative; overflow: hidden;
        font-family: "PingFang SC", "Noto Sans SC", sans-serif;
      }
      [data-composition-id="s04-review-close"] .bg {
        position: absolute; inset: 0; background: transparent;
      }
      [data-composition-id="s04-review-close"] .browser {
        position: absolute; left: 180px; top: 120px; width: 1560px; height: 840px;
        border-radius: 20px; overflow: hidden;
        background: linear-gradient(160deg, rgba(30,36,46,0.55), rgba(16,19,25,0.4));
        backdrop-filter: blur(20px) saturate(1.12);
        -webkit-backdrop-filter: blur(20px) saturate(1.12);
        border: 1px solid rgba(255,255,255,0.12);
        box-shadow: 0 34px 100px rgba(0, 0, 0, 0.58), inset 0 1px 0 rgba(255,255,255,0.16), 0 0 60px rgba(255,180,84,0.10);
      }
      [data-composition-id="s04-review-close"] .chrome {
        height: 56px; display: flex; align-items: center; padding: 0 24px;
        background: rgba(22,26,32,0.6); border-bottom: 1px solid rgba(255,255,255,0.07);
      }
      [data-composition-id="s04-review-close"] .dot {
        width: 12px; height: 12px; border-radius: 50%; margin-right: 10px;
      }
      [data-composition-id="s04-review-close"] .dot:nth-child(1) { background: #FF5F57; }
      [data-composition-id="s04-review-close"] .dot:nth-child(2) { background: #FEBC2E; }
      [data-composition-id="s04-review-close"] .dot:nth-child(3) { background: #28C840; }
      [data-composition-id="s04-review-close"] .address {
        margin-left: 18px; font-family: "SF Mono", Menlo, monospace;
        font-size: 21px; color: #AAB2BD; background: rgba(10,12,15,0.6);
        border: 1px solid rgba(255,255,255,0.06);
        padding: 7px 20px; border-radius: 8px;
      }
      [data-composition-id="s04-review-close"] .viewport {
        position: absolute; top: 56px; left: 0; width: 1560px; height: 784px;
        overflow: hidden; background: #FDFDFD;
      }
      [data-composition-id="s04-review-close"] .pagewrap {
        position: absolute; left: 30px; top: 0; width: 1500px;
        transform-origin: top left; will-change: transform;
      }
      [data-composition-id="s04-review-close"] .page { display: block; }
      [data-composition-id="s04-review-close"] .hl { position: absolute; }
      [data-composition-id="s04-review-close"] .wash {
        left: 858px; top: 88px; width: 234px; height: 28px;
        background: rgba(255, 180, 84, 0.30); border-radius: 4px; opacity: 0;
      }
      [data-composition-id="s04-review-close"] .bar {
        left: 860px; top: 118px; width: 230px; height: 3px;
        background: #FFB454; border-radius: 2px;
        transform-origin: left center; box-shadow: 0 0 12px rgba(255,180,84,0.75);
      }
    </style>

    <script src="assets/gsap.min.js"></script>
    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        const root = document.querySelector('[data-composition-id="s04-review-close"]');
        const wrap = root.querySelector(".pagewrap");

        // 特写锁定短语中心 (822,111)，全程缓推 2.6→2.75
        gsap.set(wrap, { scale: 2.6, x: -1846, y: 35 });
        gsap.set(root.querySelector(".bar"), { scaleX: 0 });
        tl.to(wrap, { scale: 2.75, x: -1998, y: 20, duration: 1.757, ease: "none" }, 0);

        // 琥珀高亮（"人工审看"读到 local 0.72，下划线 0.55 起扫）
        tl.to(root.querySelector(".wash"), { opacity: 1, duration: 0.25, ease: "power2.out" }, 0.5);
        tl.to(root.querySelector(".bar"), { scaleX: 1, duration: 0.3, ease: "power4.out" }, 0.55);

        tl.to({}, { duration: 1.757 }, 0);
        window.__timelines["s04-review-close"] = tl;
      })();
    </script>
  </div>
</template>
