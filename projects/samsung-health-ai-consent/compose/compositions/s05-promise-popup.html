<template id="s05-promise-popup-template">
  <div
    data-composition-id="s05-promise-popup"
    data-width="1920" data-height="1080"
    data-start="0" data-duration="7.96"
  >
    <div class="bg"></div>

    <!-- 左：官方撤回承诺（原文引用） -->
    <div class="card left">
      <div class="chip">官方同意页 · 原文</div>
      <div class="qmark">“</div>
      <div class="quote">You may withdraw your consent at any time in the Samsung Health settings &gt; Privacy.</div>
      <div class="zh">——随时可以撤回。</div>
      <div class="src">samsunghealth.com/shd/gen-ai</div>
    </div>

    <!-- 右：拒绝弹窗（原文引用，非截图仿制） -->
    <div class="card right">
      <div class="chip warn-chip">拒绝时弹窗 · 原文引用</div>
      <div class="qmark">“</div>
      <div class="quote">You <span class="u1">will not be able to sync</span> health data with your Samsung account and your health data <span class="w1">will be deleted</span> unless retained pursuant to applicable law.</div>
      <div class="zh zh2">——关云同步，删已同步数据。</div>
      <div class="src">via 9to5Google · 2026-07-13</div>
    </div>

    <style>
      @font-face { font-family: "PingFang SC"; src: local("PingFang SC"); }
      @font-face { font-family: "Noto Sans SC"; src: local("Noto Sans SC"); }
      @font-face { font-family: "SF Mono"; src: local("SF Mono"); }

      [data-composition-id="s05-promise-popup"] {
        width: 1920px; height: 1080px; position: relative; overflow: hidden;
        font-family: "PingFang SC", "Noto Sans SC", sans-serif;
      }
      [data-composition-id="s05-promise-popup"] .bg {
        position: absolute; inset: 0; background: transparent;
      }
      [data-composition-id="s05-promise-popup"] .card {
        position: absolute; border-radius: 22px; padding: 44px 52px;
        background: linear-gradient(160deg, rgba(32,38,48,0.58), rgba(16,19,25,0.42));
        backdrop-filter: blur(18px) saturate(1.12);
        -webkit-backdrop-filter: blur(18px) saturate(1.12);
        border: 1px solid rgba(255,255,255,0.11);
        box-shadow: 0 30px 90px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255,255,255,0.14);
      }
      [data-composition-id="s05-promise-popup"] .left {
        left: 140px; top: 210px; width: 700px; height: 560px; opacity: 0;
      }
      [data-composition-id="s05-promise-popup"] .right {
        left: 960px; top: 180px; width: 780px; height: 620px;
        background: linear-gradient(160deg, rgba(26,20,14,0.6), rgba(14,11,8,0.46));
        border-color: rgba(255,180,84,0.16);
        box-shadow: 0 30px 90px rgba(0, 0, 0, 0.55), inset 0 1px 0 rgba(255,255,255,0.10), 0 0 50px rgba(255,150,60,0.08);
        opacity: 0;
      }
      [data-composition-id="s05-promise-popup"] .chip {
        display: inline-block; font-size: 21px; color: #9AA0A8;
        border: 1px solid #2A2E36; border-radius: 6px; padding: 6px 14px;
        letter-spacing: 0.05em;
      }
      [data-composition-id="s05-promise-popup"] .warn-chip {
        color: #FFB454; border-color: rgba(255, 180, 84, 0.4);
      }
      [data-composition-id="s05-promise-popup"] .qmark {
        font-family: Georgia, serif; font-size: 110px; line-height: 1;
        color: #4A9EFF; margin-top: 26px; height: 70px;
      }
      [data-composition-id="s05-promise-popup"] .right .qmark { color: #9AA0A8; }
      [data-composition-id="s05-promise-popup"] .quote {
        font-family: Georgia, "Times New Roman", serif;
        font-size: 36px; line-height: 1.55; color: #E8EAED;
      }
      [data-composition-id="s05-promise-popup"] .u1 {
        border-bottom: 3px solid transparent;
      }
      [data-composition-id="s05-promise-popup"] .u1.on {
        border-bottom-color: #4A9EFF;
        box-shadow: 0 3px 10px -2px rgba(74,158,255,0.6);
      }
      [data-composition-id="s05-promise-popup"] .w1 {
        border-radius: 4px; padding: 0 4px; margin: 0 -4px;
      }
      [data-composition-id="s05-promise-popup"] .zh {
        margin-top: 30px; font-size: 27px; color: #9AA0A8;
      }
      [data-composition-id="s05-promise-popup"] .zh2 { opacity: 0; }
      [data-composition-id="s05-promise-popup"] .src {
        position: absolute; left: 52px; bottom: 36px;
        font-family: "SF Mono", Menlo, monospace; font-size: 20px; color: #9AA0A8;
        opacity: 0.75;
      }
    </style>

    <script src="assets/gsap.min.js"></script>
    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        const root = document.querySelector('[data-composition-id="s05-promise-popup"]');
        const left = root.querySelector(".left");
        const right = root.querySelector(".right");
        const u1 = root.querySelector(".u1");
        const w1 = root.querySelector(".w1");
        const zh2 = root.querySelector(".zh2");

        // 左卡对焦落定入场（"三星说，随时可以撤回"）
        gsap.set(left, { y: 40, filter: "blur(18px)" });
        tl.to(left, { opacity: 1, y: 0, filter: "blur(0px)", duration: 0.55, ease: "power2.out" }, 0.05);

        // local 2.043（"但"字）：面板推移——右卡压入，左卡退位变暗
        gsap.set(right, { x: 96, filter: "blur(16px)" });
        tl.to(left, { opacity: 0.35, scale: 0.96, x: -34, duration: 0.5, ease: "power2.inOut" }, 2.043);
        tl.to(right, { opacity: 1, x: 0, filter: "blur(0px)", duration: 0.5, ease: "power4.out" }, 2.093);

        // local 4.52（"云同步关闭"）：sync 短语下划线
        tl.add(() => u1.classList.add("on"), 4.52);
        tl.to(zh2, { opacity: 1, duration: 0.3, ease: "power2.out" }, 4.6);

        // local 7.05（"将被删除"）：琥珀高亮（配额 2/3）+ 辉光 + 轻微脉冲
        tl.to(w1, { backgroundColor: "rgba(255, 180, 84, 0.30)", color: "#FFD9A0", boxShadow: "0 0 24px rgba(255,180,84,0.5)", textShadow: "0 0 18px rgba(255,180,84,0.55)", duration: 0.25, ease: "power2.out" }, 7.0);
        tl.to(right, { scale: 1.012, duration: 0.1, ease: "power2.out" }, 7.05);
        tl.to(right, { scale: 1, duration: 0.3, ease: "power2.inOut" }, 7.15);

        tl.to({}, { duration: 7.96 }, 0);
        window.__timelines["s05-promise-popup"] = tl;
      })();
    </script>
  </div>
</template>
