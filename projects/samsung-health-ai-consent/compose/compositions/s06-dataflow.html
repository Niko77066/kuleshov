<template id="s06-dataflow-template">
  <div
    data-composition-id="s06-dataflow"
    data-width="1920" data-height="1080"
    data-start="0" data-duration="6.403"
  >
    <!-- MG z10，坐于抠像人物之下：数据流在右栏竖排，落在她身侧 -->
    <div class="halo-glow"></div>
    <div class="scenario-chip">如果你拒绝——</div>

    <!-- 右栏竖排三节点 -->
    <div class="col">
      <div class="node n-phone">
        <div class="glyph phone-glyph"></div>
        <div class="nlabel">你的手机<span>本地数据</span></div>
        <div class="keep-chip">本地数据仍在</div>
      </div>
      <div class="vline l1"><i></i><i></i><i></i></div>
      <div class="cut-chip">同步已断开</div>
      <div class="node n-cloud">
        <div class="glyph cloud-glyph"></div>
        <div class="nlabel">Samsung 云<span>账户同步</span></div>
      </div>
      <div class="vline l2"><i></i><i></i><i></i></div>
      <div class="node n-ai">
        <div class="glyph ai-glyph"></div>
        <div class="nlabel">AI 训练<span>含人工审看</span></div>
      </div>
    </div>

    <!-- 交换：用功能换同意 -->
    <div class="swap">
      <span class="swap-chip sa">云同步功能</span>
      <span class="swap-arrows">⇄</span>
      <span class="swap-chip sb">同意 AI 训练</span>
    </div>

    <style>
      @font-face { font-family: "PingFang SC"; src: local("PingFang SC"); }
      @font-face { font-family: "Noto Sans SC"; src: local("Noto Sans SC"); }
      @font-face { font-family: "SF Mono"; src: local("SF Mono"); }

      [data-composition-id="s06-dataflow"] {
        width: 1920px; height: 1080px; position: relative; overflow: hidden;
        background: transparent;
        font-family: "PingFang SC", "Noto Sans SC", sans-serif;
      }
      [data-composition-id="s06-dataflow"] .halo-glow {
        position: absolute; left: 250px; top: 60px; width: 800px; height: 800px;
        background: radial-gradient(circle, rgba(74,158,255,0.18) 0%, rgba(74,158,255,0) 62%);
        filter: blur(30px);
      }
      [data-composition-id="s06-dataflow"] .scenario-chip {
        position: absolute; left: 1230px; top: 120px; font-size: 30px; color: #EEF1F5;
        border: 1px solid rgba(255,255,255,0.11);
        background: linear-gradient(160deg, rgba(32,38,48,0.6), rgba(16,19,25,0.44));
        backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
        box-shadow: 0 10px 34px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.12);
        padding: 12px 26px; border-radius: 12px; opacity: 0;
      }
      /* 竖排列：节点中心 x≈1330 */
      [data-composition-id="s06-dataflow"] .col { position: absolute; left: 1210px; top: 210px; width: 620px; }
      [data-composition-id="s06-dataflow"] .node { position: relative; height: 118px; opacity: 0; }
      [data-composition-id="s06-dataflow"] .glyph {
        position: absolute; left: 0; top: 0;
        width: 108px; height: 108px; border-radius: 50%;
        background: radial-gradient(circle at 50% 40%, rgba(74,158,255,0.14), rgba(26,29,35,0.7));
        border: 2px solid #4A9EFF;
        box-shadow: 0 0 30px rgba(74,158,255,0.32), inset 0 0 20px rgba(74,158,255,0.10);
      }
      [data-composition-id="s06-dataflow"] .glyph::before { content: ""; position: absolute; inset: 0; margin: auto; }
      [data-composition-id="s06-dataflow"] .phone-glyph::before { width: 32px; height: 56px; border: 3px solid #E8EAED; border-radius: 7px; }
      [data-composition-id="s06-dataflow"] .cloud-glyph::before { width: 56px; height: 34px; border: 3px solid #E8EAED; border-radius: 18px 18px 15px 15px; }
      [data-composition-id="s06-dataflow"] .ai-glyph::before { width: 42px; height: 42px; border: 3px solid #E8EAED; border-radius: 10px; transform: rotate(45deg); }
      [data-composition-id="s06-dataflow"] .nlabel {
        position: absolute; left: 132px; top: 24px; font-size: 30px; color: #E8EAED; font-weight: 600; line-height: 1.3;
      }
      [data-composition-id="s06-dataflow"] .nlabel span { display: block; font-size: 22px; color: #9AA0A8; font-weight: 400; margin-top: 2px; }
      [data-composition-id="s06-dataflow"] .keep-chip {
        position: absolute; left: 360px; top: 34px; font-size: 21px; color: #6BB0FF;
        border: 1px solid rgba(74,158,255,0.5); border-radius: 8px; padding: 5px 13px;
        background: rgba(74,158,255,0.08); box-shadow: 0 0 18px rgba(74,158,255,0.2); opacity: 0; white-space: nowrap;
      }
      [data-composition-id="s06-dataflow"] .vline {
        position: relative; left: 53px; width: 2px; height: 72px;
        background: linear-gradient(180deg, rgba(74,158,255,0.5), rgba(74,158,255,0.15));
        transform-origin: top center;
      }
      [data-composition-id="s06-dataflow"] .vline i {
        position: absolute; left: -4px; top: 0; width: 10px; height: 10px; border-radius: 50%;
        background: #8FC4FF; opacity: 0; box-shadow: 0 0 12px 2px rgba(74,158,255,0.85);
      }
      [data-composition-id="s06-dataflow"] .cut-chip {
        position: absolute; left: 92px; top: 148px; font-size: 20px; color: #AAB2BD;
        background: rgba(22,26,32,0.75); border: 1px solid rgba(255,255,255,0.08);
        backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        border-radius: 8px; padding: 4px 12px; opacity: 0; white-space: nowrap;
      }
      [data-composition-id="s06-dataflow"] .swap {
        position: absolute; left: 1210px; top: 812px; display: flex; align-items: center; gap: 16px; opacity: 0;
      }
      [data-composition-id="s06-dataflow"] .swap-chip {
        font-size: 26px; font-weight: 600; color: #EEF1F5;
        background: linear-gradient(160deg, rgba(32,38,48,0.62), rgba(16,19,25,0.46));
        backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
        border: 1px solid rgba(255,255,255,0.11); border-radius: 10px; padding: 11px 20px;
        box-shadow: 0 10px 34px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.12);
      }
      [data-composition-id="s06-dataflow"] .swap-arrows { font-size: 34px; color: #9AA0A8; }
    </style>

    <script src="assets/gsap.min.js"></script>
    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        const root = document.querySelector('[data-composition-id="s06-dataflow"]');
        const nodes = root.querySelectorAll(".node");
        const lines = [root.querySelector(".l1"), root.querySelector(".l2")];
        const cloud = root.querySelector(".n-cloud");
        const cloudGlyph = root.querySelector(".cloud-glyph");
        const ai = root.querySelector(".n-ai");
        const aiGlyph = root.querySelector(".ai-glyph");

        lines.forEach(l => gsap.set(l, { scaleY: 0 }));
        nodes.forEach((n, i) => {
          gsap.set(n, { x: 20, filter: "blur(8px)" });
          tl.to(n, { opacity: 1, x: 0, filter: "blur(0px)", duration: 0.3, ease: "power2.out" }, i * 0.12);
        });
        tl.to(lines[0], { scaleY: 1, duration: 0.35, ease: "power2.out" }, 0.3);
        tl.to(lines[1], { scaleY: 1, duration: 0.35, ease: "power2.out" }, 0.42);
        tl.to(root.querySelector(".scenario-chip"), { opacity: 1, duration: 0.25, ease: "power2.out" }, 0.15);

        // 粒子沿竖线流动
        lines.forEach((line, li) => {
          line.querySelectorAll("i").forEach((d, di) => {
            tl.fromTo(d, { y: 0, opacity: 0 },
              { y: 64, opacity: 0.9, duration: 1.0, ease: "none", repeat: 4, repeatDelay: 0.1 },
              0.6 + li * 0.15 + di * 0.2);
          });
        });

        // local 1.03（"如果你拒绝"）：云熄灭、断开、AI 灰
        tl.to(cloudGlyph, { borderColor: "#2A2E36", boxShadow: "none", duration: 0.35 }, 1.1);
        tl.to(cloud, { opacity: 0.4, duration: 0.35 }, 1.1);
        tl.to(ai, { opacity: 0.4, duration: 0.35 }, 1.2);
        tl.to(aiGlyph, { borderColor: "#2A2E36", boxShadow: "none", duration: 0.35 }, 1.2);
        lines.forEach((line) => {
          tl.to(line, { opacity: 0.3, duration: 0.3 }, 1.1);
          line.querySelectorAll("i").forEach((d) => {
            tl.to(d, { opacity: 0, duration: 0.2, overwrite: "auto" }, 1.1);
            tl.set(d, { visibility: "hidden" }, 1.32);
          });
        });
        tl.to(root.querySelector(".cut-chip"), { opacity: 1, duration: 0.25 }, 1.3);
        tl.to(root.querySelector(".keep-chip"), { opacity: 1, duration: 0.3, ease: "power2.out" }, 1.15);

        // local 4.84（"用功能换同意"）
        tl.to(root.querySelector(".swap"), { opacity: 1, duration: 0.35, ease: "power2.out" }, 4.84);

        tl.to({}, { duration: 6.403 }, 0);
        window.__timelines["s06-dataflow"] = tl;
      })();
    </script>
  </div>
</template>
