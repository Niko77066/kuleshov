<!doctype html>
<html lang="zh" data-fps="30"><head><meta charset="UTF-8"><title>cover-dy</title>
<script src="assets/gsap.min.js"></script>
<style>
@font-face{font-family:"SerifSC";font-weight:700;src:url("assets/fonts/serif-sc-700-cn.woff2") format("woff2");}
@font-face{font-family:"SansSC";font-weight:700;src:url("assets/fonts/sans-sc-700-cn.woff2") format("woff2");}
*{margin:0;padding:0;box-sizing:border-box;}
:root{--paper:#C9A876;--ink:#2B2118;--cream:#F5EAD0;--accent:#FFD21E;--gilt:#6E4A0C;--mark:#8A2419;}
body,html{width:1080px;height:1920px;overflow:hidden;}
#main-composition{position:relative;width:1080px;height:1920px;background:var(--paper);
  background-image:radial-gradient(circle at 50% 30%,rgba(245,234,208,0.5),transparent 60%);overflow:hidden;font-family:"SansSC";}
.kick{position:absolute;top:150px;left:50%;transform:translateX(-50%);white-space:nowrap;font-weight:700;font-size:40px;color:var(--ink);background:var(--cream);border:3px solid var(--ink);border-radius:44px;padding:14px 48px;letter-spacing:2px;}
.hero{position:absolute;top:420px;left:0;right:0;text-align:center;}
.hero .l1{font-family:"SerifSC";font-weight:700;font-size:180px;color:var(--ink);line-height:1.12;}
.hero .l1 em{font-style:normal;color:var(--gilt);}
.hero .l2{font-family:"SerifSC";font-weight:700;font-size:180px;color:var(--ink);line-height:1.12;margin-top:10px;}
.hero .l2 b{color:var(--mark);}
.motif{position:absolute;top:1000px;left:50%;transform:translateX(-50%);width:440px;height:300px;background:var(--cream);border:6px solid var(--ink);border-radius:32px;display:flex;align-items:center;justify-content:center;box-shadow:0 18px 0 rgba(43,33,24,0.4);}
.motif s{text-decoration:none;position:relative;font-family:"SerifSC";font-weight:700;font-size:200px;color:var(--ink);}
.motif .strike{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%) rotate(-14deg);width:380px;height:18px;background:var(--mark);border-radius:10px;}
.pills{position:absolute;top:1420px;left:0;right:0;display:flex;flex-direction:column;align-items:center;gap:24px;}
.pills span{font-weight:700;font-size:56px;color:var(--cream);background:var(--ink);border-radius:20px;padding:18px 46px;white-space:nowrap;}
.pills span.r{background:var(--mark);}
.cta{position:absolute;bottom:230px;left:50%;transform:translateX(-50%);font-weight:700;font-size:64px;color:var(--ink);background:var(--accent);border:4px solid var(--ink);border-radius:22px;padding:22px 64px;}
#grain{position:absolute;inset:0;pointer-events:none;opacity:0.08;mix-blend-mode:overlay;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");}
#vig{position:absolute;inset:0;pointer-events:none;box-shadow:inset 0 0 220px 16px rgba(43,33,24,0.4);}
</style></head><body>
<div id="main-composition" data-composition-id="coverdy" data-width="1080" data-height="1920" data-start="0" data-duration="1" data-fps="30">
  <div class="kick clip" data-start="0" data-duration="1" data-track-index="1">生活祛魅 · 家电冷知识</div>
  <div class="hero clip" data-start="0" data-duration="1" data-track-index="2"><div class="l1">空调开 <em>26℃</em></div><div class="l2">其实<b>最不划算</b></div></div>
  <div class="motif clip" data-start="0" data-duration="1" data-track-index="3"><s>26<div class="strike"></div></s></div>
  <div class="pills clip" data-start="0" data-duration="1" data-track-index="4"><span class="r">不够凉 · 费电 · 还发臭</span></div>
  <div class="cta clip" data-start="0" data-duration="1" data-track-index="5">正确开法 →</div>
  <div id="grain" class="clip" data-start="0" data-duration="1" data-track-index="100"></div>
  <div id="vig" class="clip" data-start="0" data-duration="1" data-track-index="101"></div>
  <script>const tl=gsap.timeline({paused:true});window.__timelines=window.__timelines||{};window.__timelines["coverdy"]=tl;</script>
</div></body></html>
