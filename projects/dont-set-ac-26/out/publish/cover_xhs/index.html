<!doctype html>
<html lang="zh" data-fps="30">
<head><meta charset="UTF-8"><title>cover</title>
<script src="assets/gsap.min.js"></script>
<style>
@font-face{font-family:"SerifSC";font-weight:700;src:url("assets/fonts/serif-sc-700-cn.woff2") format("woff2");}
@font-face{font-family:"SansSC";font-weight:700;src:url("assets/fonts/sans-sc-700-cn.woff2") format("woff2");}
*{margin:0;padding:0;box-sizing:border-box;}
:root{--paper:#C9A876;--ink:#2B2118;--cream:#F5EAD0;--accent:#FFD21E;--gilt:#6E4A0C;--mark:#8A2419;}
body,html{width:1080px;height:1440px;overflow:hidden;}
#main-composition{position:relative;width:1080px;height:1440px;background:var(--paper);
  background-image:radial-gradient(circle at 50% 22%,rgba(245,234,208,0.5),transparent 62%);overflow:hidden;font-family:"SansSC";}
.kick{position:absolute;top:90px;left:50%;transform:translateX(-50%);font-weight:700;font-size:38px;color:var(--ink);
  background:var(--cream);border:2px solid var(--ink);border-radius:40px;padding:10px 34px;letter-spacing:2px;}
.hero{position:absolute;top:270px;left:0;right:0;text-align:center;}
.hero .l1{font-family:"SerifSC";font-weight:700;font-size:150px;color:var(--ink);letter-spacing:4px;line-height:1.1;}
.hero .l1 em{font-style:normal;color:var(--gilt);}
.hero .l2{font-family:"SerifSC";font-weight:700;font-size:150px;color:var(--ink);letter-spacing:4px;line-height:1.1;margin-top:6px;}
.hero .l2 b{color:var(--mark);}
.pills{position:absolute;top:760px;left:0;right:0;display:flex;justify-content:center;gap:26px;}
.pills span{font-weight:700;font-size:46px;color:var(--cream);background:var(--ink);border-radius:16px;padding:16px 34px;}
.pills span.r{background:var(--mark);}
.motif{position:absolute;top:920px;left:50%;transform:translateX(-50%);width:360px;height:230px;background:var(--cream);
  border:5px solid var(--ink);border-radius:26px;display:flex;align-items:center;justify-content:center;box-shadow:0 14px 0 rgba(43,33,24,0.4);}
.motif .num{font-family:"SerifSC";font-weight:700;font-size:150px;color:var(--ink);}
.motif .num s{text-decoration:none;position:relative;} .motif .strike{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%) rotate(-14deg);width:300px;height:14px;background:var(--mark);border-radius:8px;}
.cta{position:absolute;bottom:120px;left:50%;transform:translateX(-50%);font-weight:700;font-size:52px;color:var(--ink);
  background:var(--accent);border:3px solid var(--ink);border-radius:18px;padding:18px 50px;}
#grain{position:absolute;inset:0;pointer-events:none;opacity:0.08;mix-blend-mode:overlay;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");}
#vig{position:absolute;inset:0;pointer-events:none;box-shadow:inset 0 0 180px 12px rgba(43,33,24,0.4);}
</style></head><body>
<div id="main-composition" data-composition-id="cover" data-width="1080" data-height="1440" data-start="0" data-duration="1" data-fps="30">
  <div class="kick clip" data-start="0" data-duration="1" data-track-index="1">生活祛魅 · 家电冷知识</div>
  <div class="hero clip" data-start="0" data-duration="1" data-track-index="2"><div class="l1">空调开 <em>26℃</em></div><div class="l2">其实<b>最不划算</b></div></div>
  <div class="pills clip" data-start="0" data-duration="1" data-track-index="3"><span>不够凉</span><span>未必省电</span><span class="r">还发臭</span></div>
  <div class="motif clip" data-start="0" data-duration="1" data-track-index="4"><div class="num"><s>26<div class="strike"></div></s></div></div>
  <div class="cta clip" data-start="0" data-duration="1" data-track-index="5">附正确开法 →</div>
  <div id="grain" class="clip" data-start="0" data-duration="1" data-track-index="100"></div>
  <div id="vig" class="clip" data-start="0" data-duration="1" data-track-index="101"></div>
  <script>const tl=gsap.timeline({paused:true});window.__timelines=window.__timelines||{};window.__timelines["cover"]=tl;</script>
</div></body></html>
