<!doctype html>
<html lang="zh" data-resolution="landscape" data-fps="30">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>雅诗兰黛为什么把夜晚变成一门生意 — Kuleshov</title>
    <script src="assets/gsap.min.js"></script>
    <script src="assets/captions_data.js"></script>
    <style>
      @font-face { font-family:"SerifSC"; font-weight:700; src:url("assets/fonts/serif-sc-700-latin.woff2") format("woff2"); unicode-range:U+0000-00FF,U+2000-206F,U+2190-21FF,U+2200-22FF; }
      @font-face { font-family:"SerifSC"; font-weight:700; src:url("assets/fonts/serif-sc-700-cn.woff2") format("woff2"); }
      @font-face { font-family:"SansSC"; font-weight:400; src:url("assets/fonts/sans-sc-400-latin.woff2") format("woff2"); unicode-range:U+0000-00FF,U+2000-206F; }
      @font-face { font-family:"SansSC"; font-weight:400; src:url("assets/fonts/sans-sc-400-cn.woff2") format("woff2"); }
      @font-face { font-family:"SansSC"; font-weight:700; src:url("assets/fonts/sans-sc-700-latin.woff2") format("woff2"); unicode-range:U+0000-00FF,U+2000-206F; }
      @font-face { font-family:"SansSC"; font-weight:700; src:url("assets/fonts/sans-sc-700-cn.woff2") format("woff2"); }

      :root{ --night:#0B0E14; --velvet:#131722; --cream:#EDE6D6; --gold:#C9A96A; --amber:#8C5A2B; --rule:#2A2F3A; }
      body,html{ margin:0; padding:0; width:1920px; height:1080px; overflow:hidden; background:var(--night); font-family:"SansSC",sans-serif; }
      #main-composition{ position:relative; width:1920px; height:1080px; overflow:hidden; background:var(--night); }

      .fullframe{ position:absolute; top:0; left:0; width:1920px; height:1080px; object-fit:cover; }
      .archival{ filter:contrast(1.06) saturate(0.96) brightness(0.92); }
      .dawn-grade{ filter:sepia(0.5) saturate(1.3) hue-rotate(-16deg) brightness(0.8) contrast(1.06); }

      /* s04a 真产品官方照(压暗融入夜色) */
      .prodphoto{ filter:brightness(0.6) saturate(0.9) contrast(1.06); }
      /* 品牌字标 */
      .brandmark{ width:300px; height:auto; display:block; margin:0 auto 30px; opacity:0; filter:drop-shadow(0 2px 10px rgba(0,0,0,0.5)); }
      #ovClose .ovi{ display:flex; flex-direction:column; align-items:center; padding:70px 130px;
        background:radial-gradient(ellipse 62% 62% at 50% 50%, rgba(11,14,20,0.62), rgba(11,14,20,0) 72%); }
      #ovClose .closeline{ font-family:"SerifSC"; font-weight:700; color:var(--cream); font-size:82px; letter-spacing:3px; text-shadow:0 2px 8px rgba(0,0,0,0.95),0 0 28px rgba(0,0,0,0.7); }
      #ovClose .closelogo{ width:300px; height:auto; margin-top:38px; filter:drop-shadow(0 2px 12px rgba(0,0,0,0.9)); }

      /* MG 场景 */
      .mg{ position:absolute; top:0; left:0; width:1920px; height:1080px; background:var(--night); overflow:hidden; }
      .mg .center{ position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; }
      #s02 .thesis{ font-family:"SerifSC"; font-weight:700; color:var(--cream); font-size:110px; letter-spacing:2px; opacity:0; }
      #s02 .thesis .g{ color:var(--gold); }
      #s02 .sweep{ position:absolute; top:0; left:0; width:40%; height:100%; background:linear-gradient(100deg, transparent, rgba(201,169,106,0.22), transparent); }
      #s05b .moon{ width:230px; height:230px; border-radius:50%; box-shadow: inset -46px -22px 0 0 var(--night), 0 0 60px 6px rgba(201,169,106,0.18); background:radial-gradient(circle at 62% 40%, #f3ead6, #d8c9a6); opacity:0; }
      #s05b .cap{ margin-top:52px; font-family:"SansSC"; color:var(--cream); font-size:46px; line-height:1.5; opacity:0; }
      #s05b .cap b{ color:var(--gold); font-weight:700; }
      #s05b .ring{ position:absolute; width:520px; height:520px; border:1px solid var(--rule); border-radius:50%; opacity:0; }
      #s06a .tl{ position:absolute; left:180px; right:180px; top:520px; height:2px; background:linear-gradient(90deg,transparent,var(--gold),transparent); transform-origin:left center; }
      #s06a .node{ position:absolute; top:496px; text-align:center; transform:translateX(-50%); opacity:0; }
      #s06a .node .dot{ width:14px; height:14px; border-radius:50%; background:var(--gold); margin:0 auto 18px; box-shadow:0 0 16px 2px rgba(201,169,106,0.5); }
      #s06a .node .yr{ font-family:"SansSC"; font-weight:700; color:var(--cream); font-size:38px; }
      #s06a .node .lb{ font-family:"SansSC"; color:#9aa0ac; font-size:24px; margin-top:6px; }
      #s06a .node.hi .yr{ color:var(--gold); font-size:52px; }
      #s06a .title{ position:absolute; top:150px; left:0; right:0; text-align:center; font-family:"SansSC"; color:#9aa0ac; font-size:30px; letter-spacing:6px; opacity:0; }
      #s08a .num{ font-family:"SerifSC"; font-weight:700; color:var(--gold); font-size:300px; line-height:1; font-variant-numeric:tabular-nums; opacity:0; text-shadow:0 0 50px rgba(201,169,106,0.25); }
      #s08a .note{ font-family:"SansSC"; color:var(--cream); font-size:44px; margin-top:26px; opacity:0; }
      #s08a .note b{ color:var(--gold); font-weight:700; }

      /* 叠层容器(定位)+内层(动画) */
      .ov{ position:absolute; }
      .ovi{ opacity:0; }
      #ovNum{ top:150px; right:170px; text-align:right; }
      #ovNum .big{ font-family:"SerifSC"; font-weight:700; color:var(--gold); font-size:200px; line-height:0.9; font-variant-numeric:tabular-nums; text-shadow:0 0 40px rgba(0,0,0,0.6); }
      #ovNum .unit{ font-family:"SansSC"; color:var(--cream); font-size:44px; margin-top:8px; text-shadow:0 2px 8px rgba(0,0,0,0.8); }
      #ov1982{ left:120px; bottom:250px; }
      #ov1982 .ovi{ font-family:"SerifSC"; font-weight:700; color:var(--cream); font-size:52px; letter-spacing:3px; text-shadow:0 2px 12px rgba(0,0,0,0.7); }
      #ov1982 .g{ color:var(--gold); }
      #ovYears{ left:130px; top:150px; }
      #ovYears .ovi{ font-family:"SansSC"; font-weight:700; color:var(--gold); font-size:40px; letter-spacing:4px; line-height:1.5; text-shadow:0 2px 10px rgba(0,0,0,0.8); }
      #ovClose{ inset:0; display:flex; align-items:center; justify-content:center; }
      #ovClose .ovi{ font-family:"SerifSC"; font-weight:700; color:var(--cream); font-size:82px; letter-spacing:3px; text-shadow:0 2px 24px rgba(0,0,0,0.7); }
      .tagwrap{ position:absolute; right:56px; bottom:60px; }
      .tagwrap.left{ right:auto; left:56px; }
      .tagwrap .tag{ font-family:"SansSC"; color:#c9c4b8; font-size:26px; letter-spacing:1px; background:rgba(11,14,20,0.55); border:1px solid var(--rule); border-radius:6px; padding:8px 16px; opacity:0; }

      /* 字幕 */
      #capbox{ position:absolute; left:50%; transform:translateX(-50%); bottom:104px; width:1400px; font-family:"SansSC"; font-weight:400; color:var(--cream); font-size:42px; line-height:1.3; text-align:center; text-shadow:0 2px 6px rgba(0,0,0,0.98),0 0 22px rgba(0,0,0,0.9),0 0 2px rgba(0,0,0,0.9); opacity:0; }

      /* 全片 LUT/暗角/颗粒 */
      #lut{ position:absolute; inset:0; pointer-events:none; background:linear-gradient(180deg, rgba(11,14,20,0.15), rgba(11,14,20,0.04) 40%, rgba(11,14,20,0.22)); mix-blend-mode:multiply; }
      #tint{ position:absolute; inset:0; pointer-events:none; background:radial-gradient(135% 100% at 50% 45%, rgba(20,30,55,0), rgba(9,12,20,0.28)); }
      #vignette{ position:absolute; inset:0; pointer-events:none; box-shadow:inset 0 0 220px 10px rgba(0,0,0,0.42); }
      #grain{ position:absolute; inset:0; pointer-events:none; opacity:0.07; mix-blend-mode:overlay; background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>"); }
    </style>
  </head>
  <body>
    <div id="main-composition" data-composition-id="main-video" data-width="1920" data-height="1080" data-start="0" data-duration="59.04" data-fps="30">

      <!-- 音频 -->
      <audio id="mainaudio" class="clip" src="assets/final_mix.mp3" data-start="0" data-duration="58.98" data-track-index="0" data-volume="1" data-has-audio="true"></audio>

      <!-- 视频/图像轨 (z=1) -->
      <video id="s01" class="clip fullframe" src="assets/s01_product_hook.mp4" muted data-start="0" data-duration="5.04" data-media-start="0" data-track-index="1"></video>
      <video id="s03a" class="clip fullframe" src="assets/s03a_1982_day.mp4" muted data-start="8.864" data-duration="3.84" data-media-start="1.2" data-track-index="1"></video>
      <video id="s03b" class="clip fullframe" src="assets/s03_1982_daytonight.mp4" muted data-start="12.704" data-duration="3.16" data-media-start="1.88" data-track-index="1"></video>
      <img id="s04a" class="clip fullframe prodphoto" src="assets/s04a_photo.png" data-start="15.864" data-duration="4.136" data-track-index="1" />
      <video id="s04b" class="clip fullframe" src="assets/s04b_product_hero.mp4" muted data-start="20" data-duration="4.304" data-media-start="0.736" data-track-index="1"></video>
      <video id="s05a" class="clip fullframe archival" src="assets/s05a_dfd_moonbed.mp4" muted data-start="24.304" data-duration="3.696" data-media-start="0" data-track-index="1"></video>
      <video id="s06b" class="clip fullframe" src="assets/s06b_space_float.mp4" muted data-start="36.2" data-duration="4.224" data-media-start="0.816" data-track-index="1"></video>
      <video id="s07" class="clip fullframe" src="assets/s07_shelf_silhouette.mp4" muted data-start="40.424" data-duration="5.04" data-media-start="0" data-track-index="1"></video>
      <video id="s08b" class="clip fullframe dawn-grade" src="assets/s08b_sky.mp4" muted data-start="51.384" data-duration="7.656" data-media-start="0" data-track-index="1"></video>

      <!-- MG 场景 (z=2) -->
      <div id="s02" class="clip mg" data-start="5.04" data-duration="3.824" data-track-index="2">
        <div class="center"><div class="thesis">但它卖的不是精华，<span class="g">是夜晚</span>。</div></div>
        <div class="sweep"></div>
      </div>
      <div id="s05b" class="clip mg" data-start="28" data-duration="3.904" data-track-index="2">
        <div class="center">
          <div class="ring"></div>
          <div class="moon"></div>
          <div class="cap">睡觉，成了护肤流程的一环——<br/><b>复购</b>被写进了<b>昼夜节律</b>。</div>
        </div>
      </div>
      <div id="s06a" class="clip mg" data-start="31.904" data-duration="4.296" data-track-index="2">
        <div class="title">一条讲了四十年的时间线</div>
        <div class="tl"></div>
        <div class="node" style="left:300px"><div class="dot"></div><div class="yr">1982</div><div class="lb">第一支夜间修护</div></div>
        <div class="node" style="left:600px"><div class="dot"></div><div class="yr">1991</div><div class="lb">抗氧化</div></div>
        <div class="node hi" style="left:960px"><div class="dot"></div><div class="yr">2009</div><div class="lb">时钟基因</div></div>
        <div class="node" style="left:1320px"><div class="dot"></div><div class="yr">2013</div><div class="lb">同步修护 II</div></div>
        <div class="node" style="left:1620px"><div class="dot"></div><div class="yr">2020</div><div class="lb">送上太空</div></div>
      </div>
      <div id="s08a" class="clip mg" data-start="45.464" data-duration="5.92" data-track-index="2">
        <div class="center">
          <img class="brandmark" src="assets/logo_el_cream.svg" />
          <div class="num" id="revNum">$0.00B</div>
          <div class="note">护肤一年净销售额 <b>$6.96B</b>，占集团营收 <b>近半</b></div>
        </div>
      </div>

      <!-- 叠层 track 3 (顺序不重叠) -->
      <div id="ovNum" class="clip ov" data-start="0" data-duration="5.04" data-track-index="3">
        <div class="ovi"><div class="big" id="num22">0</div><div class="unit">瓶 / 分钟</div></div>
      </div>
      <div id="ov1982" class="clip ov" data-start="15.864" data-duration="4.136" data-track-index="3">
        <div class="ovi">1982 · <span class="g">Night Repair</span></div>
      </div>
      <div id="tagBrand2" class="clip tagwrap" data-start="36.2" data-duration="4.2" data-track-index="3"><div class="tag">数据为品牌口径</div></div>
      <div id="ovYears" class="clip ov" data-start="40.5" data-duration="4.9" data-track-index="3">
        <div class="ovi">2009 · 兰蔻小黑瓶<br/>2010 · 科颜氏午夜</div>
      </div>
      <div id="tagSec" class="clip tagwrap" data-start="45.464" data-duration="5.92" data-track-index="3"><div class="tag">来源：SEC 10-K FY2025</div></div>
      <div id="ovClose" class="clip ov" data-start="53.0" data-duration="6.04" data-track-index="3">
        <div class="ovi">
          <div class="closeline">夜晚，本来就属于你的皮肤。</div>
          <img class="closelogo" src="assets/logo_el_cream.svg" />
        </div>
      </div>

      <!-- 叠层 track 4 (与 track3 时间重叠者) -->
      <div id="tagBrand1" class="clip tagwrap" data-start="0.4" data-duration="4.6" data-track-index="4"><div class="tag">数据为品牌口径</div></div>
      <div id="tagAsof" class="clip tagwrap left" data-start="56.0" data-duration="3.04" data-track-index="4"><div class="tag">资料截至 2026-07</div></div>

      <!-- 字幕 track 5 -->
      <div id="capbox" class="clip" data-start="0" data-duration="59.04" data-track-index="5"></div>

      <!-- 全片 LUT/暗角/颗粒 -->
      <div id="lut" class="clip" data-start="0" data-duration="59.04" data-track-index="100"></div>
      <div id="tint" class="clip" data-start="0" data-duration="59.04" data-track-index="101"></div>
      <div id="vignette" class="clip" data-start="0" data-duration="59.04" data-track-index="102"></div>
      <div id="grain" class="clip" data-start="0" data-duration="59.04" data-track-index="103"></div>

      <script>
        const tl = gsap.timeline({ paused: true });
        const q = (s) => document.querySelector(s);
        const qa = (s) => Array.from(document.querySelectorAll(s));

        /* Ken Burns:SD 档案与产品静帧缓推 */
        gsap.set(["#s05a","#s04a"], { transformOrigin:"50% 48%" });
        tl.fromTo("#s05a",{scale:1.05},{scale:1.12,duration:3.696,ease:"none"},24.304);
        tl.fromTo("#s04a",{scale:1.0},{scale:1.06,duration:4.136,ease:"none"},15.864);

        /* s01 数字 count-up 22 + 角标 */
        tl.to("#ovNum .ovi",{opacity:1,duration:0.4,ease:"power2.out"},0.5);
        const n22={v:0};
        tl.to(n22,{v:22,duration:1.3,ease:"power2.out",onUpdate:()=>{q("#num22").textContent=Math.round(n22.v);}},0.7);
        tl.to("#ovNum .ovi",{opacity:0,duration:0.35},4.6); tl.set("#ovNum .ovi",{opacity:0},5.0);
        tl.to("#tagBrand1 .tag",{opacity:0.9,duration:0.4},1.0);
        tl.to("#tagBrand1 .tag",{opacity:0,duration:0.3},4.6); tl.set("#tagBrand1 .tag",{opacity:0},4.95);

        /* s02 立论卡 + 光斑扫过(全片唯一) */
        tl.to("#s02 .thesis",{opacity:1,duration:0.5,ease:"power2.out"},5.5);
        tl.fromTo("#s02 .sweep",{x:-800},{x:2200,duration:1.2,ease:"power2.inOut"},5.7);
        tl.to("#s02 .thesis",{opacity:0,duration:0.3},8.45); tl.set("#s02 .thesis",{opacity:0},8.8);

        /* s04a 标签 */
        tl.to("#ov1982 .ovi",{opacity:1,duration:0.5,ease:"power2.out"},16.4);
        tl.to("#ov1982 .ovi",{opacity:0,duration:0.3},19.5); tl.set("#ov1982 .ovi",{opacity:0},19.9);

        /* s05b 循环图 */
        tl.to("#s05b .moon",{opacity:1,duration:0.5},28.2);
        tl.fromTo("#s05b .ring",{opacity:0,rotation:0,scale:0.9},{opacity:0.5,rotation:180,scale:1,duration:3.4,ease:"none"},28.2);
        tl.to("#s05b .moon",{rotation:20,duration:3.4,ease:"none"},28.2);
        tl.to("#s05b .cap",{opacity:1,duration:0.5},28.8);
        tl.to(["#s05b .moon","#s05b .cap","#s05b .ring"],{opacity:0,duration:0.3},31.5);
        tl.set(["#s05b .moon","#s05b .cap","#s05b .ring"],{opacity:0},31.85);

        /* s06a 时间线 */
        tl.to("#s06a .title",{opacity:1,duration:0.4},32.0);
        tl.fromTo("#s06a .tl",{scaleX:0},{scaleX:1,duration:1.1,ease:"power2.out"},32.0);
        qa("#s06a .node").forEach((node,i)=>{
          const target = node.classList.contains("hi") ? 1 : 0.85;
          tl.fromTo(node,{opacity:0,y:12},{opacity:target,y:0,duration:0.35},32.2+i*0.22);
        });
        tl.to(["#s06a .node","#s06a .tl","#s06a .title"],{opacity:0,duration:0.3},35.85);
        tl.set(["#s06a .node","#s06a .tl","#s06a .title"],{opacity:0},36.15);

        /* s06b 太空角标 */
        tl.to("#tagBrand2 .tag",{opacity:0.9,duration:0.4},36.5);
        tl.to("#tagBrand2 .tag",{opacity:0,duration:0.3},39.9); tl.set("#tagBrand2 .tag",{opacity:0},40.3);

        /* s07 年份 */
        tl.to("#ovYears .ovi",{opacity:1,duration:0.5,ease:"power2.out"},40.9);
        tl.to("#ovYears .ovi",{opacity:0,duration:0.3},45.0); tl.set("#ovYears .ovi",{opacity:0},45.35);

        /* s08a 大数字 count-up $6.96B + 品牌字标 */
        tl.to("#s08a .brandmark",{opacity:0.92,duration:0.5,ease:"power2.out"},45.7);
        tl.to("#s08a .num",{opacity:1,duration:0.4},45.8);
        const rev={v:0};
        tl.to(rev,{v:6.96,duration:1.4,ease:"power2.out",onUpdate:()=>{q("#revNum").textContent="$"+rev.v.toFixed(2)+"B";}},45.9);
        tl.to("#s08a .note",{opacity:1,duration:0.5},46.9);
        tl.to("#tagSec .tag",{opacity:0.9,duration:0.4},46.2);
        tl.to(["#s08a .num","#s08a .note","#s08a .brandmark"],{opacity:0,duration:0.4},50.85);
        tl.set(["#s08a .num","#s08a .note","#s08a .brandmark"],{opacity:0},51.3);
        tl.to("#tagSec .tag",{opacity:0,duration:0.4},50.85); tl.set("#tagSec .tag",{opacity:0},51.3);

        /* s08b 收尾句 + 时效戳 + 收黑 */
        tl.to("#ovClose .ovi",{opacity:1,duration:0.9,ease:"power2.out"},53.4);
        tl.to("#tagAsof .tag",{opacity:0.85,duration:0.5},56.0);
        tl.to(["#ovClose .ovi","#tagAsof .tag"],{opacity:0,duration:1.2,ease:"power2.in"},57.6);
        tl.to("#s08b",{opacity:0,duration:1.2,ease:"power2.in"},57.6);
        tl.set(["#ovClose .ovi","#tagAsof .tag"],{opacity:0},58.9);

        /* 字幕:按 TTS 句读逐句显隐 */
        const box=q("#capbox");
        (window.__captions||[]).forEach((c)=>{
          tl.to(box,{opacity:1,duration:0.14,ease:"power2.out",onStart:()=>{box.textContent=c.text;}},c.start);
          tl.to(box,{opacity:0,duration:0.14,ease:"power2.in"},c.end);
        });
        tl.set(box,{opacity:0},59.0);

        window.__timelines = window.__timelines || {};
        window.__timelines["main-video"] = tl;
      </script>
    </div>
  </body>
</html>
