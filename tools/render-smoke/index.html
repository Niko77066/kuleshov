<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>kuleshov 渲染机冒烟 composition</title>
    <style>
      html, body { margin:0; padding:0; width:1280px; height:720px; overflow:hidden;
        font-family: "PingFang SC", sans-serif; }
      #root { width:1280px; height:720px; position:relative; }
      .card { position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
        flex-direction:column; color:#F4F1EA; }
      .big { font-size:120px; font-weight:900; letter-spacing:8px; }
      .sub { font-size:36px; margin-top:24px; letter-spacing:4px; opacity:0.85; }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="master" data-width="1280" data-height="720" data-start="0" data-duration="3">
      <div class="card clip" style="background:#17181C" data-start="0" data-duration="1.5" data-track-index="10">
        <div class="big">SMOKE 1/2</div>
        <div class="sub">kuleshov · 渲染机通路验证 · 0.0–1.5s</div>
      </div>
      <div class="card clip" style="background:#C8451B" data-start="1.5" data-duration="1.5" data-track-index="10">
        <div class="big">SMOKE 2/2</div>
        <div class="sub">1.5–3.0s · 若两卡都在说明时序正确</div>
      </div>
    </div>
  </body>
</html>
